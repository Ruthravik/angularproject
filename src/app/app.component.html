<!-- Navigation Bar (shown only when authenticated) -->
<nav class="app-navbar" *ngIf="isAuthenticated && currentRoute !== '/login'">
  <div class="navbar-content">
    <!-- Logo -->
    <div class="navbar-brand" (click)="navigateTo('/dashboard')">
      <div class="brand-icon">🏢</div>
      <div class="brand-text">
        <span class="brand-title">VendorPortal</span>
        <span class="brand-subtitle">SAP Integration</span>
      </div>
    </div>

    <!-- Navigation Links -->
    <div class="navbar-nav">
      <button 
        class="nav-link"
        [class.active]="currentRoute === '/dashboard'"
        (click)="navigateTo('/dashboard')"
        title="Dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard</span>
      </button>

      <button 
        class="nav-link"
        [class.active]="currentRoute === '/profile'"
        (click)="navigateTo('/profile')"
        title="Profile">
        <span class="nav-icon">👤</span>
        <span class="nav-text">Profile</span>
      </button>
    </div>

    <!-- User Actions -->
    <div class="navbar-actions">
      <button class="nav-link logout-btn" (click)="logout()" title="Logout">
        <span class="nav-icon">🚪</span>
        <span class="nav-text">Logout</span>
      </button>
    </div>
  </div>
</nav>

<!-- Main Content Area -->
<main class="app-main" [class.with-navbar]="isAuthenticated && currentRoute !== '/login'">
  <router-outlet></router-outlet>
</main>

<!-- Global Loading Overlay (if needed) -->
<div class="global-loading" *ngIf="false">
  <div class="loading-spinner spin"></div>
</div>
